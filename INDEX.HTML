<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario ONG</title>
    <link rel="stylesheet" href="style.css">
    <script src="script/atividade.js" defer></script>
</head>
<body>
    <div class="teste"><h2>Formulário de Adoção</h2>
    <br><h3>por favor responda as seguintes perguntas</h3></div>
<div class="flex">
    

<div class="bob"><form id="form">

    <label>Nome:</label>
    <input type="text" id="nome"><br><br>

    <label>Email:</label>
    <input type="text" id="email"><br><br>

    <label>Telefone:</label>
    <input type="text" id="telefone"><br><br>

    <label>CPF:</label>
    <input type="text" id="cpf"><br><br>

    <label>Idade:</label>
    <input type="number" id="idade"><br><br>

    <label>Cidade:</label>
    <input type="text" id="cidade"><br><br>

    <label>Moradia:</label>
    <select id="moradia">
        <option value="">Selecione</option>
        <option value="casa">Casa</option>
        <option value="apartamento">Apartamento</option>
    </select><br><br>

    <label>Possui quintal?</label>
    <input type="radio" name="quintal" value="sim">Sim
    <input type="radio" name="quintal" value="nao">Não<br><br>

    <label>Já teve pet?</label>
    <input type="radio" name="pet" value="sim">Sim
    <input type="radio" name="pet" value="nao">Não<br><br>

    <label>Horas sozinho:</label>
    <input type="number" id="horas"><br><br>

    <label>Motivo da adoção:</label>
    <textarea id="motivo"></textarea><br><br>

    <label>Tem condições financeiras?</label>
    <input type="radio" name="dinheiro" value="sim">Sim
    <input type="radio" name="dinheiro" value="nao">Não<br><br>

    <label>Decidiu adotar hoje?</label>
    <input type="radio" name="impulso" value="sim">Sim
    <input type="radio" name="impulso" value="nao">Não<br><br>

    <label>
        <input type="checkbox" id="termo"> Aceito o termo
    </label><br><br>

    <button type="submit">Enviar</button>

</form>

<div id="resultado"></div>
</div>




</div>


</body>
</html>
